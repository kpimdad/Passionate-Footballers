name: Fetch WC Results

on:
  schedule:
    # Run every 15 min around the clock — script exits in <1s when nothing is pending
    # so there's zero API/quota cost during quiet hours
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch and score results
        run: node fetch-results.js
        working-directory: scripts
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
